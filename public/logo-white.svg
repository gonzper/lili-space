<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .primary { fill: none; stroke: #ffffff; stroke-width: 3; }
            .text-main { fill: #ffffff; font-family: 'Georgia', serif; }
            .name { font-size: 72px; font-style: italic; }
        </style>
    </defs>

    <!-- Head outline -->
    <path class="primary" d="M150 60 
